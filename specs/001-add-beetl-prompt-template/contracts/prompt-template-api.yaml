openapi: 3.0.3
info:
  title: Prompt 模板管理 API
  description: Prompt 模板的增删改查接口，支持 Beetl 模板渲染预览
  version: 1.0.0
  
servers:
  - url: /api/v1
    description: API v1

tags:
  - name: prompt-template
    description: Prompt 模板管理

paths:
  /prompt-templates:
    post:
      tags:
        - prompt-template
      summary: 创建 Prompt 模板
      description: 创建新的 Prompt 模板，系统自动分配版本号并标记为最新版本
      operationId: createPromptTemplate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptTemplateCreateRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权
        '403':
          description: 无权限

    get:
      tags:
        - prompt-template
      summary: 查询 Prompt 模板列表
      description: 分页查询 Prompt 模板列表，支持多条件筛选
      operationId: listPromptTemplates
      security:
        - bearerAuth: []
      parameters:
        - name: charId
          in: query
          description: 角色ID
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          description: 状态（0=草稿，1=启用，2=停用）
          schema:
            type: integer
            enum: [0, 1, 2]
        - name: isLatest
          in: query
          description: 是否最新版本
          schema:
            type: boolean
        - name: page
          in: query
          description: 页码（从1开始）
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: 每页数量
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
        '401':
          description: 未授权
        '403':
          description: 无权限

  /prompt-templates/{id}:
    get:
      tags:
        - prompt-template
      summary: 查询 Prompt 模板详情
      description: 根据ID查询单个 Prompt 模板的完整信息
      operationId: getPromptTemplateById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 模板ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 未授权
        '403':
          description: 无权限
        '404':
          description: 模板不存在

    put:
      tags:
        - prompt-template
      summary: 更新 Prompt 模板
      description: 根据ID更新 Prompt 模板信息
      operationId: updatePromptTemplate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 模板ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptTemplateUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 请求参数错误
        '401':
          description: 未授权
        '403':
          description: 无权限
        '404':
          description: 模板不存在

    delete:
      tags:
        - prompt-template
      summary: 删除 Prompt 模板
      description: 根据ID逻辑删除 Prompt 模板
      operationId: deletePromptTemplate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 模板ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 未授权
        '403':
          description: 无权限
        '404':
          description: 模板不存在

  /prompt-templates/{id}/render:
    post:
      tags:
        - prompt-template
      summary: 渲染预览 Prompt 模板
      description: 传入参数渲染模板，返回预览结果
      operationId: renderPromptTemplate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 模板ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptTemplateRenderRequest'
      responses:
        '200':
          description: 渲染成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderResponse'
        '400':
          description: 渲染参数错误或模板语法错误
        '401':
          description: 未授权
        '403':
          description: 无权限
        '404':
          description: 模板不存在

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PromptTemplateCreateRequest:
      type: object
      required:
        - charId
        - content
      properties:
        charId:
          type: integer
          format: int64
          description: 角色ID
          example: 1001
        description:
          type: string
          maxLength: 255
          description: 模板描述
          example: "通用对话模板 - 友好风格"
        modelCode:
          type: string
          maxLength: 64
          description: 适用模型代码
          example: "gpt-4.1"
        lang:
          type: string
          maxLength: 16
          default: "zh-CN"
          description: 模板语言
          example: "zh-CN"
        content:
          type: string
          description: 模板内容（Beetl 模板语法）
          example: "你是 ${characterName}，请以 ${style} 的风格回复用户。"
        paramSchema:
          type: object
          description: 模板参数结构说明（JSON Schema）
          example:
            type: object
            properties:
              characterName:
                type: string
              style:
                type: string
            required:
              - characterName
        status:
          type: integer
          enum: [0, 1, 2]
          default: 0
          description: 状态（0=草稿，1=启用，2=停用）
        grayStrategy:
          type: integer
          enum: [0, 1, 2]
          default: 0
          description: 灰度策略（0=无灰度，1=按比例，2=按用户白名单）
        grayRatio:
          type: integer
          minimum: 0
          maximum: 100
          description: 灰度比例（0-100），grayStrategy=1时有效
        grayUserList:
          type: array
          items:
            type: integer
            format: int64
          description: 灰度用户白名单，grayStrategy=2时有效
        priority:
          type: integer
          default: 0
          description: 模板优先级（值越大越优先）
        tags:
          type: object
          description: 扩展匹配条件
          example:
            region: "cn"
            channel: "app"

    PromptTemplateUpdateRequest:
      type: object
      properties:
        description:
          type: string
          maxLength: 255
          description: 模板描述
        modelCode:
          type: string
          maxLength: 64
          description: 适用模型代码
        lang:
          type: string
          maxLength: 16
          description: 模板语言
        content:
          type: string
          description: 模板内容（Beetl 模板语法）
        paramSchema:
          type: object
          description: 模板参数结构说明
        status:
          type: integer
          enum: [0, 1, 2]
          description: 状态
        isStable:
          type: boolean
          description: 是否稳定版本
        grayStrategy:
          type: integer
          enum: [0, 1, 2]
          description: 灰度策略
        grayRatio:
          type: integer
          minimum: 0
          maximum: 100
          description: 灰度比例
        grayUserList:
          type: array
          items:
            type: integer
            format: int64
          description: 灰度用户白名单
        priority:
          type: integer
          description: 模板优先级
        tags:
          type: object
          description: 扩展匹配条件

    PromptTemplateRenderRequest:
      type: object
      required:
        - params
      properties:
        params:
          type: object
          description: 渲染参数
          additionalProperties: true
          example:
            characterName: "小助手"
            style: "友好"

    PromptTemplateResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 模板ID
        charId:
          type: integer
          format: int64
          description: 角色ID
        description:
          type: string
          description: 模板描述
        modelCode:
          type: string
          description: 适用模型代码
        lang:
          type: string
          description: 模板语言
        content:
          type: string
          description: 模板内容
        paramSchema:
          type: object
          description: 模板参数结构说明
        version:
          type: integer
          description: 版本号
        isLatest:
          type: boolean
          description: 是否最新版本
        isStable:
          type: boolean
          description: 是否稳定版本
        status:
          type: integer
          description: 状态
        grayStrategy:
          type: integer
          description: 灰度策略
        grayRatio:
          type: integer
          description: 灰度比例
        grayUserList:
          type: array
          items:
            type: integer
            format: int64
          description: 灰度用户白名单
        priority:
          type: integer
          description: 模板优先级
        tags:
          type: object
          description: 扩展匹配条件
        createdBy:
          type: string
          description: 创建人
        updatedBy:
          type: string
          description: 更新人
        createdAt:
          type: string
          format: date-time
          description: 创建时间
        updatedAt:
          type: string
          format: date-time
          description: 更新时间

    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应码，0表示成功
          example: 0
        message:
          type: string
          description: 响应消息
          example: "success"
        data:
          $ref: '#/components/schemas/PromptTemplateResponse'

    PagedResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应码
          example: 0
        message:
          type: string
          description: 响应消息
          example: "success"
        data:
          type: object
          properties:
            total:
              type: integer
              description: 总记录数
            list:
              type: array
              items:
                $ref: '#/components/schemas/PromptTemplateResponse'

    RenderResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应码
          example: 0
        message:
          type: string
          description: 响应消息
          example: "success"
        data:
          type: object
          properties:
            renderedContent:
              type: string
              description: 渲染后的模板内容
              example: "你是 小助手，请以 友好 的风格回复用户。"

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误码
          example: 400
        message:
          type: string
          description: 错误消息
          example: "模板内容不能为空"
        details:
          type: array
          items:
            type: string
          description: 详细错误信息
