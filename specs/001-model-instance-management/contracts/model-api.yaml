openapi: 3.0.3
info:
  title: AI 模型管理 API
  description: 模型实例的注册、查询、更新和删除接口
  version: 1.0.0
  contact:
    name: Boboa Boot Team

servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发环境
  - url: https://api.example.com/api/v1
    description: 生产环境

tags:
  - name: 模型管理
    description: AI 模型的 CRUD 操作
  - name: 健康监控
    description: 模型健康状态查询

paths:
  /models:
    get:
      tags:
        - 模型管理
      summary: 查询模型列表
      description: 分页查询已注册的模型列表，支持按提供商、类型、状态过滤
      operationId: listModels
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码（从1开始）
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: 每页大小
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: provider
          in: query
          description: 过滤提供商
          schema:
            type: string
            enum: [openai, azure_openai, qwen, yi, gemini, claude]
        - name: modelType
          in: query
          description: 过滤模型类型
          schema:
            type: string
            enum: [CHAT, EMBEDDING, RERANKER]
        - name: enabled
          in: query
          description: 过滤启用状态
          schema:
            type: boolean
      responses:
        '200':
          description: 成功返回模型列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: 总记录数
                        example: 15
                      list:
                        type: array
                        items:
                          $ref: '#/components/schemas/ModelResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - 模型管理
      summary: 注册新模型
      description: 手动注册一个新的 AI 模型实例
      operationId: registerModel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRegisterRequest'
      responses:
        '201':
          description: 模型注册成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "模型注册成功"
                  data:
                    $ref: '#/components/schemas/ModelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 模型已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 40901
                message: "模型 GPT-4 版本 gpt-4-turbo 已存在"

  /models/{id}:
    get:
      tags:
        - 模型管理
      summary: 查询模型详情
      description: 根据模型 ID 查询详细信息（不包含 API Key）
      operationId: getModelById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 模型 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功返回模型详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "success"
                  data:
                    $ref: '#/components/schemas/ModelResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - 模型管理
      summary: 更新模型配置
      description: 更新模型的配置信息（name 和 version 不可修改）
      operationId: updateModel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 模型 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "更新成功"
                  data:
                    $ref: '#/components/schemas/ModelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - 模型管理
      summary: 删除模型
      description: 删除指定模型（如果被路由策略引用则无法删除）
      operationId: deleteModel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 模型 ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "删除成功"
        '400':
          description: 模型正在使用中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 40001
                message: "该模型正在被路由策略 '默认策略' 使用，无法删除"
        '404':
          $ref: '#/components/responses/NotFound'

  /models/health:
    get:
      tags:
        - 健康监控
      summary: 查询所有模型健康状态
      description: 获取所有已注册模型的当前健康状态
      operationId: getModelsHealth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功返回健康状态列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "success"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModelHealthResponse'

  /models/{id}/health/history:
    get:
      tags:
        - 健康监控
      summary: 查询模型历史可用性
      description: 获取指定模型的历史健康检查记录（最近24小时）
      operationId: getModelHealthHistory
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 模型 ID
          schema:
            type: integer
            format: int64
        - name: hours
          in: query
          description: 查询时间范围（小时）
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 168
      responses:
        '200':
          description: 成功返回历史数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      modelId:
                        type: integer
                        format: int64
                      modelName:
                        type: string
                      uptimePercentage:
                        type: number
                        format: double
                        description: 可用率（%）
                        example: 99.5
                      checkRecords:
                        type: array
                        items:
                          $ref: '#/components/schemas/HealthCheckRecord'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ModelRegisterRequest:
      type: object
      required:
        - name
        - version
        - provider
        - modelType
        - apiEndpoint
        - apiKey
      properties:
        name:
          type: string
          description: 模型名称
          example: "GPT-4"
          minLength: 1
          maxLength: 100
        version:
          type: string
          description: 模型版本
          example: "gpt-4-turbo"
          minLength: 1
          maxLength: 50
        provider:
          type: string
          description: 提供商
          enum: [openai, azure_openai, qwen, yi, gemini, claude, ollama]
          example: "openai"
        modelType:
          type: string
          description: 模型类型
          enum: [CHAT, EMBEDDING, RERANKER]
          example: "CHAT"
        apiEndpoint:
          type: string
          description: API 端点 URL
          example: "https://api.openai.com/v1"
          format: uri
        apiKey:
          type: string
          description: API 密钥（将被加密存储）
          example: "sk-xxxxxxxxxxxxx"
          minLength: 1
        contextLength:
          type: integer
          description: 上下文长度（token 数）
          example: 8192
          minimum: 1
        parameterCount:
          type: string
          description: 参数量描述
          example: "175B"
        tags:
          type: array
          description: 自定义标签
          items:
            type: string
          example: ["fast", "cheap"]
        weight:
          type: integer
          description: 路由权重
          default: 1
          minimum: 1
          maximum: 100
        enabled:
          type: boolean
          description: 是否启用
          default: true

    ModelUpdateRequest:
      type: object
      properties:
        apiEndpoint:
          type: string
          format: uri
        apiKey:
          type: string
          description: 新的 API 密钥
        contextLength:
          type: integer
        parameterCount:
          type: string
        tags:
          type: array
          items:
            type: string
        weight:
          type: integer
          minimum: 1
          maximum: 100
        enabled:
          type: boolean

    ModelResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "GPT-4"
        version:
          type: string
          example: "gpt-4-turbo"
        provider:
          type: string
          example: "openai"
        modelType:
          type: string
          example: "CHAT"
        apiEndpoint:
          type: string
          example: "https://api.openai.com/v1"
        contextLength:
          type: integer
          example: 8192
        parameterCount:
          type: string
          example: "175B"
        tags:
          type: array
          items:
            type: string
          example: ["fast", "enterprise"]
        weight:
          type: integer
          example: 5
        enabled:
          type: boolean
          example: true
        createdBy:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedBy:
          type: integer
          format: int64
        updatedAt:
          type: string
          format: date-time

    ModelHealthResponse:
      type: object
      properties:
        modelId:
          type: integer
          format: int64
        modelName:
          type: string
        status:
          type: string
          enum: [ONLINE, OFFLINE, TIMEOUT, AUTH_FAILED]
          example: "ONLINE"
        consecutiveFailures:
          type: integer
          example: 0
        lastCheckTime:
          type: string
          format: date-time
        lastSuccessTime:
          type: string
          format: date-time
        responseTimeMs:
          type: integer
          description: 最近响应时间（毫秒）
          example: 250
        uptimePercentage:
          type: number
          format: double
          description: 最近24小时可用率（%）
          example: 99.5

    HealthCheckRecord:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [ONLINE, OFFLINE, TIMEOUT, AUTH_FAILED]
        responseTimeMs:
          type: integer
        errorMessage:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误码
        message:
          type: string
          description: 错误信息
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 40000
            message: "参数验证失败：name 不能为空"
            
    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 40100
            message: "Token 无效或已过期"
            
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 40400
            message: "模型不存在"
            
    InternalServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 50000
            message: "服务器内部错误"
