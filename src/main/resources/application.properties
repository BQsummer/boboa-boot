# --- IP Rate Limiter (Guava RateLimiter) ---
# Requests allowed per second for each IP (default: 10)
# ip.rate.limit.permits-per-second=10
# Timeout in milliseconds when trying to acquire a permit (0 means no waiting, try-and-fail fast)
# ip.rate.limit.timeout-millis=0
# Cache eviction time in minutes for idle IP entries (default: 30)
# ip.rate.limit.cache-expire-minutes=30
# Max number of IP entries kept in cache (default: 10000)
# ip.rate.limit.cache-max-size=10000
# Comma-separated blacklist of IPs (exact match); requests from these IPs will get 403
# ip.rate.limit.blacklist=192.168.1.10,203.0.113.7

# --- Robot Task Scheduler ---
# Task loader interval (seconds)
robot.task.loader-interval-seconds=30
# Load tasks within next N minutes to memory queue
robot.task.load-window-minutes=10
# Maximum tasks to load in one batch
robot.task.max-load-size=5000
# Timeout detection threshold (minutes)
robot.task.timeout-threshold-minutes=5
# Timeout recovery job interval (minutes)
robot.task.timeout-recovery-interval-minutes=5
# Cleanup job interval (days)
robot.task.cleanup-interval-days=1
# DONE task retention (days)
robot.task.done-retention-days=30
# FAILED task retention (days)
robot.task.failed-retention-days=90

# --- Robot Task Executor Thread Pool ---
# Core thread pool size (threads always alive)
robot.task.executor-core-pool-size=5
# Max thread pool size (maximum concurrent threads)
robot.task.executor-max-pool-size=20
# Thread pool queue capacity (pending tasks buffer)
robot.task.executor-queue-capacity=1000

# --- Robot Task Queue Capacity Control ---
# Maximum in-memory queue size (prevents OOM from unlimited growth)
# When queue is full, new tasks will be rejected and logged
# Recommendation: Set based on available memory, typical range 1000-10000
robot.task.max-queue-size=5000

# --- Robot Task Concurrency Control by Action Type ---
# These limits control how many tasks of each type can execute concurrently
# Benefits:
#   1. Prevent resource exhaustion (CPU, memory, network bandwidth)
#   2. Provide isolation between different task types
#   3. Allow fine-grained control based on task characteristics
# 
# Important: Sum of all concurrency limits should not exceed executor-max-pool-size
#            Current sum: 10 + 5 + 10 = 25, max-pool-size: 20
#            System will log a WARNING if sum > max-pool-size
#
# Concurrency limit for SEND_MESSAGE tasks
#   Characteristics: Lightweight HTTP/API calls, fast completion
#   Recommendation: Higher concurrency (10-20)
robot.task.concurrency-send-message=10

# Concurrency limit for SEND_VOICE tasks
#   Characteristics: CPU/bandwidth intensive (audio encoding/transmission)
#   Recommendation: Lower concurrency (3-5) to prevent resource saturation
robot.task.concurrency-send-voice=5

# Concurrency limit for SEND_NOTIFICATION tasks
#   Characteristics: Lightweight push notifications, fast completion
#   Recommendation: Higher concurrency (10-20)
robot.task.concurrency-send-notification=10

# Note: If a task type's concurrency limit is set to 0, that task type will be disabled
#       (tasks will remain in queue and continuously retry without execution)

# --- LLM Task Configuration ---
# Default model ID for AI character LLM inference
robot.task.default-model-id=1
# Delay in seconds before executing SEND_MESSAGE tasks (allows for batching/throttling)
robot.task.message-delay-seconds=3
